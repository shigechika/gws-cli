name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜 UTC 0:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/googleworkspace/cli.git
          git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Upstream has $COUNT new commit(s)"

      - name: Attempt merge
        if: steps.check.outputs.count != '0'
        id: merge
        run: |
          BRANCH="sync-upstream/$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Files the fork has deleted and wants to keep deleted.
          # If upstream modifies any of these, auto-resolve by removing them.
          FORK_DELETED_FILES=(
            ".github/workflows/release.yml"
            ".github/workflows/automation.yml"
            ".github/workflows/cla.yml"
            ".github/workflows/coverage.yml"
            ".github/workflows/generate-skills.yml"
            ".github/workflows/publish-skills.yml"
            ".github/workflows/release-changesets.yml"
            ".github/workflows/stale.yml"
            "dist-workspace.toml"
          )

          if git merge upstream/main --no-edit; then
            CONFLICT=false
          else
            # Auto-resolve modify/delete conflicts for files the fork deleted.
            RESOLVED=false
            for f in "${FORK_DELETED_FILES[@]}"; do
              if git status --porcelain "$f" 2>/dev/null | grep -q "^DU\|^UD"; then
                git rm -f "$f" || true
                RESOLVED=true
              fi
            done

            # Check if any conflicts remain after auto-resolution.
            if git diff --name-only --diff-filter=U | grep -q .; then
              # Real conflicts remain — commit as-is for manual resolution.
              git add -A
              git commit -m "sync: merge upstream/main (conflicts need manual resolution)" --no-verify || true
              CONFLICT=true
            elif [ "$RESOLVED" = "true" ]; then
              # Only fork-deleted-file conflicts existed, and we resolved them.
              git commit --no-edit
              CONFLICT=false
            else
              # Should not happen, but safe fallback.
              git add -A
              git commit -m "sync: merge upstream/main" --no-verify || true
              CONFLICT=true
            fi
          fi

          if [ "$CONFLICT" = "false" ]; then
            # Strip issue/PR number references to prevent cross-references
            MSG=$(git log -1 --format=%B)
            CLEANED=$(echo "$MSG" | sed 's/ (#[0-9]\+)//g; s/#[0-9]\+//g')
            if [ "$MSG" != "$CLEANED" ]; then
              git commit --amend -m "$CLEANED"
            fi
          fi
          echo "conflict=$CONFLICT" >> "$GITHUB_OUTPUT"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git push -u origin "$BRANCH"

      - name: Create PR (clean merge)
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflict == 'false'
        run: |
          UPSTREAM_VER=$(git describe --tags upstream/main 2>/dev/null || git rev-parse --short upstream/main)
          gh pr create \
            --title "sync: merge upstream/main ($UPSTREAM_VER)" \
            --body "$(cat <<'EOF'
          ## Summary
          - upstream/main を自動マージしました（コンフリクトなし）
          - レビュー後にマージしてください

          ### チェックリスト
          - [ ] CI が通ること
          - [ ] MCP 機能に影響がないこと（`mcp_server.rs`, `helpers/gmail/mod.rs` の `pub(crate)` 可視性）
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR (conflict)
        if: steps.check.outputs.count != '0' && steps.merge.outputs.conflict == 'true'
        run: |
          UPSTREAM_VER=$(git describe --tags upstream/main 2>/dev/null || git rev-parse --short upstream/main)
          gh pr create \
            --title "sync: merge upstream/main ($UPSTREAM_VER) — 要手動解決" \
            --body "$(cat <<'EOF'
          ## Summary
          - upstream/main のマージでコンフリクトが発生しました
          - 手動で解決してください

          ### MCP 温存チェックリスト
          - [ ] `crates/google-workspace-cli/src/mcp_server.rs` が残っていること
          - [ ] `crates/google-workspace-cli/src/main.rs` の `mod mcp_server` と MCP エントリが残っていること
          - [ ] `crates/google-workspace-cli/src/helpers/gmail/mod.rs` の `pub(crate)` 可視性が維持されていること
          - [ ] `cargo clippy -- -D warnings && cargo test` が通ること
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
